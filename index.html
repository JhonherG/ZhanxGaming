<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jhonher Gaming</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
}

header{
    background:linear-gradient(90deg,#ff00ff,#00ffff);
    padding:20px;
    text-align:center;
}

header h1{
    font-size:3rem;
    text-shadow:0 0 15px #fff;
}

nav{
    background:#111;
    padding:15px;
    text-align:center;
}

nav a{
    color:#00ffff;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:80px 20px;
    background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover;
}

.hero h2{
    font-size:3rem;
    text-shadow:0 0 10px black;
}

.hero p{
    margin-top:15px;
    font-size:1.2rem;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:#ff00ff;
    color:white;
    padding:12px 25px;
    text-decoration:none;
    border-radius:10px;
}

.videos{
    padding:50px 20px;
    text-align:center;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    margin-top:30px;
}

.video-card{
    background:#181818;
    padding:15px;
    border:2px solid #00ffff;
    border-radius:15px;
}

.video-card video{
    width:100%;
    border-radius:10px;
}

.upload-area{
    border:3px dashed #00ffff;
    padding:30px;
    margin:30px auto;
    max-width:700px;
    border-radius:15px;
    cursor:pointer;
    transition:0.3s;
}

.upload-area:hover{
    background:#111;
}

.upload-area.dragover{
    background:#222;
    border-color:#ff00ff;
}

.upload-btn{
    background:#00ffff;
    color:black;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    margin-top:15px;
}

footer{
    text-align:center;
    padding:20px;
    background:#111;
    margin-top:50px;
}
</style>
</head>

<body>

<header>
    <h1>🎮 Jhonher Gaming 🎮</h1>
</header>

<nav>
    <a href="#">Inicio</a>
    <a href="#">Videos</a>
    <a href="#">Juegos</a>
    <a href="#">Contacto</a>
</nav>

<section class="hero">
    <h2>Bienvenido a mi mundo gamer</h2>
    <p>Gameplays, shooters, retos y contenido épico.</p>
    <a href="#videos" class="btn">Ver Videos</a>
</section>

<section class="videos" id="videos">

    <h2>🔥 Últimos Videos</h2>

    <div class="upload-area" id="uploadArea">
        <h3>📁 Arrastra y suelta tus videos aquí</h3>
        <p style="margin-top:10px;">
            O selecciónalos desde tu computador
        </p>

        <input
            type="file"
            id="videoInput"
            accept="video/*"
            multiple
            hidden
        >

        <button
            class="upload-btn"
            onclick="document.getElementById('videoInput').click()">
            🎬 Subir Videos
        </button>
    </div>

    <div class="video-grid" id="videoGrid">

        <div class="video-card">
            <iframe
                width="100%"
                height="200"
                src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                frameborder="0"
                allowfullscreen>
            </iframe>
            <h3>Gameplay #1</h3>
        </div>

        <div class="video-card">
            <iframe
                width="100%"
                height="200"
                src="https://www.youtube.com/embed/dQw4w9WgXcQ"
                frameborder="0"
                allowfullscreen>
            </iframe>
            <h3>Gameplay #2</h3>
        </div>

    </div>

</section>

<footer>
    ©️ 2026 Jhonher Gaming
</footer>

<script>

const uploadArea = document.getElementById("uploadArea");
const videoInput = document.getElementById("videoInput");
const videoGrid = document.getElementById("videoGrid");

function agregarVideos(files){

    [...files].forEach(file => {

        if(!file.type.startsWith("video/")){
            return;
        }

        const videoURL = URL.createObjectURL(file);

        const card = document.createElement("div");
        card.className = "video-card";

        card.innerHTML = `
            <video controls>
                <source src="${videoURL}" type="${file.type}">
                Tu navegador no soporta videos.
            </video>
            <h3>${file.name}</h3>
        `;

        videoGrid.prepend(card);
    });
}

videoInput.addEventListener("change", (e)=>{
    agregarVideos(e.target.files);
});

uploadArea.addEventListener("dragover", (e)=>{
    e.preventDefault();
    uploadArea.classList.add("dragover");
});

uploadArea.addEventListener("dragleave", ()=>{
    uploadArea.classList.remove("dragover");
});

uploadArea.addEventListener("drop", (e)=>{
    e.preventDefault();
    uploadArea.classList.remove("dragover");
    agregarVideos(e.dataTransfer.files);
});

</script>

</body>
</html>
